name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download static site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh_pages_sha="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/heads/gh-pages" \
            | jq -r '.object.sha')"
          curl -fsSL --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o gh-pages.zip \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/zipball/${gh_pages_sha}"
          unzip -q gh-pages.zip
          mkdir site
          top_dir="$(find . -maxdepth 1 -type d -name '*burger-pos-*' | head -n 1)"
          cp -a "${top_dir}/." site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
