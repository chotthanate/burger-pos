name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download static site
        run: |
          set -euo pipefail
          curl -L --retry 3 -o gh-pages.zip "https://github.com/${GITHUB_REPOSITORY}/archive/refs/heads/gh-pages.zip"
          unzip -q gh-pages.zip
          mkdir site
          top_dir="$(find . -maxdepth 1 -type d -name 'burger-pos-*' | head -n 1)"
          cp -a "${top_dir}/." site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
